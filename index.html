<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Memoria · Objetos</title>
  <meta name="theme-color" content="#1e2b3c">
  <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIk1lbW9yaWEgT2JqZXRvcyIsCiAgInNob3J0X25hbWUiOiAiTWVtb3JpYSIsCiAgImRlc2NyaXB0aW9uIjogImp1ZWdvIGRlIG1lbW9yaWEgY29uIG9iamV0b3MiLAogICJzdGFydF91cmwiOiAiLiIsCiAgImRpc3BsYXkiOiAic3RhbmRhcm9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiIzFlMmIzYyIsCiAgInRoZW1lX2NvbG9yIjogIiMxZTJiM2MiLAogICJpY29ucyI6IFsKICAgIHsKICAgICAgInNyYyI6ICJkYXRhOmltYWdlL3N2Zyt4bWwsJTNDc3ZnIHhtbG5zPSdodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2Zycgdmlld0JveD0nMCAwIDUxMiA1MTInJTNFJTNDcmVjdCB3aWR0aD0nNTEyJyBoZWlnaHQ9JzUxMicgcng9JzUwJyBmaWxsPSclMjMxZTJiM2MnLyUzRSUzQ3RleHQgeD0nMjU2JyB5PSczMjAnIGZvbnQtc2l6ZT0nMjUwJyB0ZXh0LWFuY2hvcj0nbWlkZGxlJyBmaWxsPSclMjNmMGFlZTMnJTNFJUZDRiUzQy90ZXh0JTNFJTNDL3N2ZyUzRQogICAgICAiLAogICAgICAic2l6ZXMiOiAiNTEyeDUxMiIsCiAgICAgICJ0eXBlIjogImltYWdlL3N2Zyt4bWwiLAogICAgICAicHVycG9zZSI6ICJhbnkgbWFza2FibGUiCiAgICB9CiAgXQp9">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #1e2b3c 0%, #0f1a26 100%);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 8px;
      margin: 0;
    }
    .game-container {
      max-width: 520px;
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(2px);
      border-radius: 20px;
      padding: 10px 10px 14px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.04);
    }
    .top-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      margin-bottom: 8px;
    }
    .top-bar-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .app-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: #1e2b3c;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      border: 1px solid rgba(255,255,255,0.12);
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .app-icon img {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: block;
    }
    h1 {
      font-size: 15px;
      font-weight: 600;
      color: #f0eae3;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    h1 small {
      font-size: 10px;
      font-weight: 400;
      opacity: 0.5;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      align-items: center;
    }
    .diff-group {
      background: rgba(0,0,0,0.3);
      border-radius: 30px;
      padding: 2px;
      display: flex;
      gap: 2px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .diff-group button {
      background: transparent;
      border: none;
      color: #b6c8d9;
      font-weight: 500;
      font-size: 9px;
      padding: 3px 8px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .diff-group button.active {
      background: #e6b17e;
      color: #1e2b3c;
      box-shadow: 0 2px 6px rgba(230, 177, 126, 0.2);
    }
    .diff-group button:hover:not(.active) {
      color: #f0eae3;
    }
    .btn-restart {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: #f0eae3;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 500;
      font-size: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 3px;
      transition: 0.2s;
    }
    .btn-restart:hover {
      background: rgba(230, 177, 126, 0.12);
      border-color: #e6b17e;
    }
    .btn-install {
      background: rgba(230, 177, 126, 0.15);
      border: 1px solid rgba(230, 177, 126, 0.25);
      color: #e6b17e;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 500;
      font-size: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: 0.2s;
      white-space: nowrap;
    }
    .btn-install:hover {
      background: rgba(230, 177, 126, 0.25);
      border-color: #e6b17e;
    }
    .btn-install.hidden {
      display: none;
    }
    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 10px;
      margin-bottom: 8px;
      background: rgba(0,0,0,0.12);
      border-radius: 14px;
      padding: 4px 10px;
      border: 1px solid rgba(255,255,255,0.02);
    }
    .stat-item {
      display: flex;
      align-items: baseline;
      gap: 3px;
      color: #b6c8d9;
      font-size: 10px;
    }
    .stat-item span {
      color: #f0eae3;
      font-weight: 600;
      font-size: 12px;
      min-width: 20px;
    }
    .stat-item .label {
      font-size: 8px;
      text-transform: uppercase;
      letter-spacing: 0.2px;
      opacity: 0.5;
    }
    .stat-item.best span {
      color: #e6b17e;
    }
    .phase-badge {
      background: rgba(230, 177, 126, 0.1);
      border: 1px solid rgba(230, 177, 126, 0.15);
      border-radius: 30px;
      padding: 1px 10px;
      font-size: 10px;
      font-weight: 500;
      color: #e6b17e;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 8px;
    }
    .phase-badge .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #e6b17e;
      display: inline-block;
      animation: pulse-dot 1.4s infinite;
    }
    @keyframes pulse-dot {
      0% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
      100% { opacity: 0.3; transform: scale(0.8); }
    }
    .board {
      display: grid;
      gap: 5px;
      margin-bottom: 8px;
    }
    .board.cols-4 { grid-template-columns: repeat(4, 1fr); }
    .board.cols-6 { grid-template-columns: repeat(6, 1fr); }
    @media (max-width: 420px) {
      .board.cols-6 { grid-template-columns: repeat(4, 1fr); }
    }
    .card {
      aspect-ratio: 3 / 4;
      background: #263544;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      cursor: pointer;
      box-shadow: 0 3px 0 #0b141e, 0 4px 10px rgba(0,0,0,0.35);
      transition: all 0.1s ease;
      border: 1.5px solid rgba(255,255,255,0.04);
      color: #f0eae3;
      user-select: none;
      position: relative;
      transform: translateY(-1px);
    }
    .card.flipped {
      background: #2e4155;
      box-shadow: 0 2px 0 #0b141e, 0 4px 10px rgba(0,0,0,0.35);
      transform: translateY(1px);
      border-color: rgba(230, 177, 126, 0.3);
    }
    .card.matched {
      background: #1f3a2e;
      border-color: #6f9e7a;
      box-shadow: 0 2px 0 #0b141e, 0 0 10px rgba(111, 158, 122, 0.1);
      opacity: 0.75;
      cursor: default;
      transform: translateY(1px);
    }
    .card.matched .card-emoji {
      filter: drop-shadow(0 0 3px rgba(111, 158, 122, 0.3));
    }
    .card-emoji {
      font-size: 1.6rem;
      line-height: 1;
      transition: 0.15s;
    }
    .card.preview {
      background: #2e4155;
      border-color: rgba(255, 215, 150, 0.35);
      transform: translateY(1px);
      box-shadow: 0 2px 0 #0b141e, 0 4px 10px rgba(0,0,0,0.35);
    }
    .card.hidden-card {
      background: #1f2d3a;
    }
    .found-area {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      align-items: center;
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid rgba(255,255,255,0.04);
      min-height: 24px;
    }
    .found-chip {
      background: rgba(230, 177, 126, 0.08);
      border: 1px solid rgba(230, 177, 126, 0.12);
      border-radius: 20px;
      padding: 1px 7px 1px 5px;
      font-size: 10px;
      color: #f0eae3;
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .found-chip .emoji {
      font-size: 11px;
    }
    .found-empty {
      color: #7a8a9a;
      font-size: 10px;
      opacity: 0.5;
    }
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(3px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: 0.2s;
      padding: 12px;
    }
    .modal-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }
    .modal {
      background: #1e2b3c;
      border-radius: 22px;
      padding: 20px 18px;
      max-width: 260px;
      width: 100%;
      text-align: center;
      border: 1px solid rgba(230, 177, 126, 0.12);
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      transform: scale(0.95) translateY(6px);
      transition: 0.2s;
    }
    .modal-overlay.show .modal {
      transform: scale(1) translateY(0);
    }
    .modal h2 {
      font-size: 20px;
      color: #f0eae3;
      margin-bottom: 2px;
    }
    .modal .sub {
      color: #b6c8d9;
      font-size: 12px;
      margin-bottom: 12px;
    }
    .modal .stats-row {
      display: flex;
      justify-content: center;
      gap: 18px;
      margin: 12px 0;
    }
    .modal .stats-row div {
      text-align: center;
    }
    .modal .stats-row .num {
      font-size: 20px;
      font-weight: 700;
      color: #e6b17e;
    }
    .modal .stats-row .lbl {
      font-size: 9px;
      text-transform: uppercase;
      color: #7a8a9a;
      letter-spacing: 0.3px;
    }
    .modal button {
      background: #e6b17e;
      border: none;
      color: #1e2b3c;
      font-weight: 700;
      font-size: 12px;
      padding: 8px 22px;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.12s;
      box-shadow: 0 3px 0 #a87d58;
    }
    .modal button:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 0 #a87d58;
    }
    .modal button:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #a87d58;
    }
    @media (max-width: 400px) {
      .game-container { padding: 8px; }
      .card { border-radius: 8px; }
      .card-emoji { font-size: 1.3rem; }
      .stats { padding: 3px 8px; gap: 3px 8px; }
      .stat-item { font-size: 9px; }
      .stat-item span { font-size: 10px; min-width: 16px; }
      .diff-group button { font-size: 8px; padding: 2px 6px; }
      .btn-restart { font-size: 9px; padding: 2px 8px; }
      .btn-install { font-size: 9px; padding: 2px 8px; }
      .app-icon { width: 28px; height: 28px; font-size: 16px; }
      .app-icon img { width: 24px; height: 24px; }
    }
  </style>
</head>
<body>
<div class="game-container">
  <div class="top-bar">
    <div class="top-bar-left">
      <div class="app-icon">
        <svg viewBox="0 0 512 512" width="28" height="28">
          <rect width="512" height="512" rx="50" fill="#1e2b3c"/>
          <text x="256" y="320" font-size="250" text-anchor="middle" fill="#f0eae3" font-family="Arial">🧩</text>
        </svg>
      </div>
      <h1>Memoria <small>objetos</small></h1>
    </div>
    <div class="controls">
      <div class="diff-group" id="diffGroup">
        <button data-diff="facil">Fácil</button>
        <button data-diff="normal" class="active">Normal</button>
        <button data-diff="dificil">Difícil</button>
      </div>
      <button class="btn-install hidden" id="installBtn">📲 Instalar</button>
      <button class="btn-restart" id="restartBtn">↻</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat-item"><span id="statMoves">0</span><span class="label">mov</span></div>
    <div class="stat-item"><span id="statTime">00:00</span><span class="label">⏱</span></div>
    <div class="stat-item"><span id="statPairs">0/8</span><span class="label">pares</span></div>
    <div class="stat-item best"><span id="statBest">—</span><span class="label">⭐</span></div>
  </div>

  <div class="phase-badge" id="phaseBadge">
    <span class="dot"></span> <span id="phaseText">👀 Mirá</span>
  </div>

  <div class="board cols-4" id="board"></div>

  <div class="found-area" id="foundArea">
    <span class="found-empty" id="foundEmpty">🔍 encontrá pares</span>
    <div id="foundChips" style="display:flex;flex-wrap:wrap;gap:3px;"></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>🎉 ¡Listo!</h2>
    <p class="sub">Todos los objetos encontrados</p>
    <div class="stats-row">
      <div><div class="num" id="finalMoves">0</div><div class="lbl">movimientos</div></div>
      <div><div class="num" id="finalTime">00:00</div><div class="lbl">tiempo</div></div>
    </div>
    <button id="playAgainBtn">Jugar de nuevo</button>
  </div>
</div>

<script>
  (function(){
    // ---- INSTALL ----
    let deferredPrompt = null;
    const installBtn = document.getElementById('installBtn');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.classList.remove('hidden');
    });

    installBtn.addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const result = await deferredPrompt.userChoice;
        if (result.outcome === 'accepted') {
          installBtn.classList.add('hidden');
        }
        deferredPrompt = null;
      }
    });

    window.addEventListener('appinstalled', () => {
      installBtn.classList.add('hidden');
    });

    // ---- GAME ----
    const OBJECTS = [
      { id: 'sol',   name: 'Sol',   emoji: '☀️' },
      { id: 'luna',  name: 'Luna',  emoji: '🌙' },
      { id: 'estrella', name: 'Estrella', emoji: '⭐' },
      { id: 'nube',  name: 'Nube',  emoji: '☁️' },
      { id: 'lluvia', name: 'Lluvia', emoji: '🌧️' },
      { id: 'nieve', name: 'Nieve', emoji: '❄️' },
      { id: 'arcoiris', name: 'Arcoíris', emoji: '🌈' },
      { id: 'relampago', name: 'Relámpago', emoji: '⚡' },
      { id: 'hoja',  name: 'Hoja',  emoji: '🍃' },
      { id: 'flor',  name: 'Flor',  emoji: '🌸' },
      { id: 'arbol', name: 'Árbol', emoji: '🌳' },
      { id: 'corazon', name: 'Corazón', emoji: '❤️' }
    ];

    const DIFFICULTIES = {
      facil:   { pairs: 6,  cols: 4 },
      normal:  { pairs: 8,  cols: 4 },
      dificil: { pairs: 12, cols: 6 }
    };

    let state = {
      diff: 'normal',
      cards: [],
      flippedIndices: [],
      matchedIds: [],
      moves: 0,
      seconds: 0,
      timer: null,
      started: false,
      locked: false,
      previewPhase: true,
      previewTimer: null,
    };

    const boardEl = document.getElementById('board');
    const statMoves = document.getElementById('statMoves');
    const statTime = document.getElementById('statTime');
    const statPairs = document.getElementById('statPairs');
    const statBest = document.getElementById('statBest');
    const phaseText = document.getElementById('phaseText');
    const foundChips = document.getElementById('foundChips');
    const foundEmpty = document.getElementById('foundEmpty');
    const modalOverlay = document.getElementById('modalOverlay');

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function formatTime(s) {
      const m = String(Math.floor(s / 60)).padStart(2, '0');
      const sec = String(s % 60).padStart(2, '0');
      return `${m}:${sec}`;
    }

    function bestKey(diff) { return `memoria-objetos-best-${diff}`; }

    function loadBest(diff) {
      try {
        const raw = localStorage.getItem(bestKey(diff));
        return raw ? JSON.parse(raw) : null;
      } catch { return null; }
    }

    function saveBestIfBetter(diff, moves, seconds) {
      const cur = loadBest(diff);
      if (!cur || moves < cur.moves || (moves === cur.moves && seconds < cur.seconds)) {
        localStorage.setItem(bestKey(diff), JSON.stringify({ moves, seconds }));
        return true;
      }
      return false;
    }

    function renderBest() {
      const b = loadBest(state.diff);
      statBest.textContent = b ? `${b.moves} · ${formatTime(b.seconds)}` : '—';
    }

    function buildDeck(diff) {
      const cfg = DIFFICULTIES[diff];
      const selected = shuffle([...OBJECTS]).slice(0, cfg.pairs);
      let deck = [];
      selected.forEach(obj => {
        deck.push({ id: obj.id + '-a', objectId: obj.id, matched: false });
        deck.push({ id: obj.id + '-b', objectId: obj.id, matched: false });
      });
      return shuffle(deck);
    }

    function getObject(id) {
      return OBJECTS.find(o => o.id === id);
    }

    function renderBoard() {
      const cfg = DIFFICULTIES[state.diff];
      boardEl.className = 'board ' + (cfg.cols === 6 ? 'cols-6' : 'cols-4');
      boardEl.innerHTML = '';

      state.cards.forEach((card, idx) => {
        const obj = getObject(card.objectId);
        const div = document.createElement('div');
        div.className = 'card';
        div.dataset.index = idx;
        div.setAttribute('role', 'button');
        div.setAttribute('tabindex', '0');

        const content = document.createElement('span');
        content.className = 'card-emoji';
        if (card.matched) {
          div.classList.add('matched');
          content.textContent = obj.emoji;
        } else {
          if (state.previewPhase || state.flippedIndices.includes(idx)) {
            div.classList.add('flipped');
            content.textContent = obj.emoji;
          } else {
            div.classList.add('hidden-card');
            content.textContent = '✦';
            content.style.fontSize = '1rem';
            content.style.opacity = '0.2';
          }
        }
        div.appendChild(content);
        boardEl.appendChild(div);

        div.addEventListener('click', () => onCardClick(idx));
        div.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            onCardClick(idx);
          }
        });
      });

      if (state.previewPhase) {
        document.querySelectorAll('.card').forEach(c => c.classList.add('preview'));
      }
      updateStats();
    }

    function updateStats() {
      statMoves.textContent = state.moves;
      statTime.textContent = formatTime(state.seconds);
      const cfg = DIFFICULTIES[state.diff];
      const found = state.cards.filter(c => c.matched).length / 2;
      statPairs.textContent = `${found}/${cfg.pairs}`;
      renderBest();

      const foundIds = [...new Set(state.cards.filter(c => c.matched).map(c => c.objectId))];
      foundChips.innerHTML = '';
      if (foundIds.length === 0) {
        foundEmpty.style.display = 'inline';
      } else {
        foundEmpty.style.display = 'none';
        foundIds.forEach(id => {
          const obj = getObject(id);
          const chip = document.createElement('span');
          chip.className = 'found-chip';
          chip.innerHTML = `<span class="emoji">${obj.emoji}</span> ${obj.name}`;
          foundChips.appendChild(chip);
        });
      }
    }

    function startPreview() {
      state.previewPhase = true;
      phaseText.textContent = '👀 Mirá las cartas';
      renderBoard();
      document.querySelectorAll('.card').forEach(c => {
        c.classList.add('preview', 'flipped');
        const emoji = c.querySelector('.card-emoji');
        const idx = parseInt(c.dataset.index);
        const cardData = state.cards[idx];
        const obj = getObject(cardData.objectId);
        if (!cardData.matched) {
          emoji.textContent = obj.emoji;
          emoji.style.fontSize = '';
          emoji.style.opacity = '';
        }
      });

      clearTimeout(state.previewTimer);
      state.previewTimer = setTimeout(() => {
        state.previewPhase = false;
        phaseText.textContent = '🔍 Encontrá los pares';
        document.querySelectorAll('.card').forEach(c => {
          c.classList.remove('preview');
          const idx = parseInt(c.dataset.index);
          const cardData = state.cards[idx];
          const emoji = c.querySelector('.card-emoji');
          if (!cardData.matched && !state.flippedIndices.includes(idx)) {
            c.classList.remove('flipped');
            c.classList.add('hidden-card');
            emoji.textContent = '✦';
            emoji.style.fontSize = '1rem';
            emoji.style.opacity = '0.2';
          } else if (cardData.matched) {
            c.classList.add('matched');
            emoji.textContent = getObject(cardData.objectId).emoji;
          } else {
            c.classList.add('flipped');
            emoji.textContent = getObject(cardData.objectId).emoji;
          }
        });
        if (state.cards.every(c => c.matched)) {
          finishGame();
        }
        updateStats();
      }, 2800);
    }

    function onCardClick(idx) {
      if (state.locked) return;
      if (state.previewPhase) return;

      const card = state.cards[idx];
      const div = boardEl.children[idx];
      if (card.matched) return;
      if (state.flippedIndices.includes(idx)) return;
      if (state.flippedIndices.length >= 2) return;

      if (!state.started) {
        state.started = true;
        state.timer = setInterval(() => {
          state.seconds++;
          statTime.textContent = formatTime(state.seconds);
        }, 1000);
      }

      state.flippedIndices.push(idx);
      div.classList.add('flipped');
      div.classList.remove('hidden-card');
      const emoji = div.querySelector('.card-emoji');
      const obj = getObject(card.objectId);
      emoji.textContent = obj.emoji;
      emoji.style.fontSize = '';
      emoji.style.opacity = '';

      if (state.flippedIndices.length === 2) {
        state.moves++;
        statMoves.textContent = state.moves;
        state.locked = true;

        const idx1 = state.flippedIndices[0];
        const idx2 = state.flippedIndices[1];
        const card1 = state.cards[idx1];
        const card2 = state.cards[idx2];
        const match = (card1.objectId === card2.objectId);

        if (match) {
          setTimeout(() => {
            card1.matched = true;
            card2.matched = true;
            const div1 = boardEl.children[idx1];
            const div2 = boardEl.children[idx2];
            div1.classList.add('matched');
            div2.classList.add('matched');
            state.flippedIndices = [];
            state.locked = false;
            updateStats();

            const cfg = DIFFICULTIES[state.diff];
            const found = state.cards.filter(c => c.matched).length / 2;
            if (found === cfg.pairs) {
              finishGame();
            }
          }, 350);
        } else {
          setTimeout(() => {
            const div1 = boardEl.children[idx1];
            const div2 = boardEl.children[idx2];
            if (!state.cards[idx1].matched) {
              div1.classList.remove('flipped');
              div1.classList.add('hidden-card');
              const em1 = div1.querySelector('.card-emoji');
              em1.textContent = '✦';
              em1.style.fontSize = '1rem';
              em1.style.opacity = '0.2';
            }
            if (!state.cards[idx2].matched) {
              div2.classList.remove('flipped');
              div2.classList.add('hidden-card');
              const em2 = div2.querySelector('.card-emoji');
              em2.textContent = '✦';
              em2.style.fontSize = '1rem';
              em2.style.opacity = '0.2';
            }
            state.flippedIndices = [];
            state.locked = false;
          }, 600);
        }
      }
    }

    function finishGame() {
      clearInterval(state.timer);
      state.timer = null;
      document.getElementById('finalMoves').textContent = state.moves;
      document.getElementById('finalTime').textContent = formatTime(state.seconds);
      saveBestIfBetter(state.diff, state.moves, state.seconds);
      renderBest();
      modalOverlay.classList.add('show');
    }

    function startNewGame(diff) {
      clearInterval(state.timer);
      clearTimeout(state.previewTimer);
      state.diff = diff;
      state.cards = buildDeck(diff);
      state.flippedIndices = [];
      state.matchedIds = [];
      state.moves = 0;
      state.seconds = 0;
      state.started = false;
      state.locked = false;
      state.previewPhase = true;

      modalOverlay.classList.remove('show');
      statTime.textContent = '00:00';
      statMoves.textContent = '0';
      const cfg = DIFFICULTIES[diff];
      statPairs.textContent = `0/${cfg.pairs}`;
      renderBest();
      renderBoard();
      startPreview();
    }

    document.getElementById('diffGroup').addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-diff]');
      if (!btn) return;
      document.querySelectorAll('#diffGroup button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      startNewGame(btn.dataset.diff);
    });

    document.getElementById('restartBtn').addEventListener('click', () => {
      startNewGame(state.diff);
    });

    document.getElementById('playAgainBtn').addEventListener('click', () => {
      startNewGame(state.diff);
    });

    startNewGame('normal');
  })();
</script>
</body>
</html>
